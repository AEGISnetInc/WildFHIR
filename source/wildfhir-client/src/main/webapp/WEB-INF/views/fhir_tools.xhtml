<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:p="http://primefaces.org/ui"
    xmlns:c="http://java.sun.com/jstl/core">

    <!-- This is the view file for the WildFHIR Tools Tab -->

	<p:tab title="Tools" id="toolsTab" dynamic="true">

		<p:panelGrid id="toolsTabPanel1" columns="1" border="0"
			cellpadding="0" cellspacing="0" styleClass="borderlessGridPanel">
			<h:outputText value="WildFHIR Tools"
				style="padding:0px;font-style:italic;font-weight:bold;font-size:14px;" />
		</p:panelGrid>

		<p:tabView id="toolsTabView" widgetVar="toolsTabView" dynamic="true" cache="false">

			<p:ajax event="tabChange" listener="#{controller.onTabChange}"
				update=":tabView:toolsTabView:fhirpathEvaluateForm,:tabView:toolsTabView:fhirpathEvaluateForm2,:tabView:toolsTabView:subscriptionClientForm" />

			<ui:include src="/WEB-INF/views/tools/fhirpathEvaluate.xhtml" />
			<ui:include src="/WEB-INF/views/tools/subscriptionsClient.xhtml" />

		</p:tabView>
	</p:tab>

</ui:composition>
