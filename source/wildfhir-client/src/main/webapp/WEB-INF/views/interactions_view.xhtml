<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jstl/core">

	<!-- This is the view file for the Interactions Tab -->

	<p:tab title="FHIR Interactions" id="interactionsTab" cache="false">

		<p:panelGrid id="interactionsTabPanel1" columns="1" border="0"
			cellpadding="0" cellspacing="0" styleClass="borderlessGridPanel">
			<h:outputText value="FHIR Interactions"
				style="padding:0px;font-style:italic;font-weight:bold;font-size:14px;" />
		</p:panelGrid>

		<p:tabView id="interactionsTabView" widgetVar="interactionsTabView" cache="false">

			<p:ajax event="tabChange" listener="#{controller.onTabChange}"
				update=":tabView:interactionsTabView:fhirReadForm,:tabView:interactionsTabView:fhirVReadForm,:tabView:interactionsTabView:historyForm,:tabView:interactionsTabView:fhirSearchForm,:tabView:interactionsTabView:fhirMetadataForm,:tabView:interactionsTabView:fhirCreateForm,:tabView:interactionsTabView:fhirCreateForm2,:tabView:interactionsTabView:fhirUpdateForm,:tabView:interactionsTabView:fhirUpdateForm2,:tabView:interactionsTabView:fhirPatchForm" />

			<ui:include src="/WEB-INF/views/interactions/fhirRead.xhtml" />
			<ui:include src="/WEB-INF/views/interactions/fhirVRead.xhtml" />
			<ui:include src="/WEB-INF/views/interactions/fhirHistory.xhtml" />
			<ui:include src="/WEB-INF/views/interactions/fhirSearch.xhtml" />
			<ui:include src="/WEB-INF/views/interactions/fhirCreate.xhtml" />
			<ui:include src="/WEB-INF/views/interactions/fhirUpdate.xhtml" />
			<ui:include src="/WEB-INF/views/interactions/fhirPatch.xhtml" />
			<ui:include src="/WEB-INF/views/interactions/fhirMetadata.xhtml" />

		</p:tabView>
	</p:tab>

</ui:composition>
