<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jstl/core">

	<!-- This is the view file for the FHIR (r) Create Service Tab under the FHIR Interactions Tab -->

	<p:tab title="create" id="createTab">
		<h:form id="fhirCreateForm" prependId="false" style="width:100%;border:none;">
			<p:message for="fhirCreateForm" />
			<p></p>
			<p:panelGrid id="createPanel" layout="tabular" columns="2" border="0" cellpadding="3" cellspacing="10" styleClass="borderlessGridPanel">
				<h:outputText value="Resource Type: * " />
				<p:selectOneMenu required="true" label="Select FHIR Resource Type" value="#{context.selectedResourceType}" maxlength="255" style="width:240px;text-align:left;padding-right:30px;">
					<f:selectItem itemValue="#{null}" itemLabel="-- Select Resource Type --    " noSelectionOption="true" />
					<f:selectItems value="#{context.supportedResourceTypes}" var="resourceType" itemLabel="#{resourceType}         " itemValue="#{resourceType}" />
				</p:selectOneMenu>

				<h:outputText value="Format Type (Default JSON): * " />
				<p:selectOneMenu required="false" label="Select Format Type" value="#{context.selectedFormatType}" maxlength="10" style="width:80px;text-align:left;padding-right:30px;">
					<f:selectItems value="#{context.formatTypes}" var="formatType" itemLabel="#{formatType}         " itemValue="#{formatType}" />
				</p:selectOneMenu>

				<h:outputText value="Select FHIR Server: * " />
				<p:selectOneMenu required="true" label="Select FHIR Server" value="#{context.selectedServerURL}" maxlength="255" style="width:240px;text-align:left;padding-right:30px;">
					<f:selectItem itemValue="#{null}" itemLabel="-- Select FHIR Server --         " noSelectionOption="true" />
					<f:selectItems value="#{context.availableServers}" var="server" itemLabel="#{server.name.trim()}         " itemValue="#{server.basePath}" />
				</p:selectOneMenu>
			</p:panelGrid>
		</h:form>
		<p>
			<h:outputText value=" " />
		</p>
		<h:form id="fhirCreateForm2" prependId="false" style="width:100%;border:none;" enctype="multipart/form-data" acceptcharset="UTF-8">
			<p:panel id="createResourcePanel" widgetVar="createResourcePanel" dynamic="true" cache="false">
				<p:tabView id="createResourceTabView" widgetVar="createResourceTabView" dynamic="true" cache="false">
					<p:tab title="Resource Definition" id="createResourceDefinitionTab">
						<p:panelGrid id="createPanel2" layout="tabular" columns="2" border="0" cellpadding="3" cellspacing="10" styleClass="borderlessGridPanel">
							<h:outputText value="Conditional Options" style="font-weight: bold" />
							<h:outputText value=" " />

							<h:outputText value="If-None-Exist: " />
							<h:inputText value="#{context.ifNoneExist}"
								maxlength="255" required="false"
								requiredMessage="Please enter the If-None-Exist conditional criteria" size="40" />

							<h:outputText value="Return Content Preference: " />
							<p:selectOneMenu value="#{context.prefer}" maxlength="30" style="width:160px;text-align:left;padding-right:30px;">
								<f:selectItem itemLabel="Select..." itemValue="" noSelectionOption="true" />
								<f:selectItem itemLabel="Minimal         " itemValue="return=minimal" />
								<f:selectItem itemLabel="Representation         " itemValue="return=representation" />
								<f:selectItem itemLabel="OperationOutcome         " itemValue="return=OperationOutcome" />
							</p:selectOneMenu>

							<h:outputText value="_format: " />
							<h:inputText value="#{context._format}"
								maxlength="255" required="false"
								requiredMessage="Please enter the return format type (overrides the Accepts HTTP Header)" size="40" />
						</p:panelGrid>

						<p:commandButton value="Create Resource" icon="ui-icon-document"
							actionListener="#{controller.fhirCreate}"
							oncomplete="PF('createResourceTabView').select(2)"
							update=":tabView:interactionsTabView:fhirCreateForm,:tabView:interactionsTabView:fhirCreateForm2">
						</p:commandButton>
						<br />
						<br />
						<h:inputTextarea required="true" id="resourceStringTextArea" value="#{context.resourceString}" cols="80" rows="24" />
					</p:tab>

					<p:tab title="Create Tags" id="createTagsTab">
						<h:outputText id="lblCreateTags" value="Create Tags Go Here" />
					</p:tab>

					<p:tab title="Create Results" id="createResultsTab">
						<h:outputText id="lblCreateResults" escape="true"
							value="#{context.responseString}"
							styleClass="whiteSpaceClass" />
					</p:tab>
				</p:tabView>
			</p:panel>
		</h:form>
	</p:tab>
</ui:composition>
