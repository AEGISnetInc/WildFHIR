<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:p="http://primefaces.org/ui"
    template="/WEB-INF/templates/default.xhtml"
    xmlns:c="http://java.sun.com/jstl/core">
    <ui:define name="content">

		<ui:param name="updateExistingProvider" value="false" />
		<h:outputStylesheet>
			.borderlessGridPanel tr, .borderlessGridPanel td {border-width:0px;}
			.whiteSpaceClass {
    			white-space: pre-wrap;
			}
		</h:outputStylesheet>

        <div>
            <p> </p>
			<ui:include src="/WEB-INF/views/tabbed_view.xhtml" />
        </div>
		<p:confirmDialog global="true" showEffect="fade" hideEffect="explode">
	        <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="ui-icon-check"/>
	        <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" icon="ui-icon-close"/>
	    </p:confirmDialog>

		<p:ajaxStatus style="margin:0 auto;border:0px !important; display:block;" onstart="PF('requestStatusDialog').show()" onsuccess="PF('requestStatusDialog').hide()" />

		<p:dialog widgetVar="requestStatusDialog" style="border:0px !important;" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
			<img src="resources/images/ajaxLoading.gif" />
		</p:dialog>
    </ui:define>
</ui:composition>
